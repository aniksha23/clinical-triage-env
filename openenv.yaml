name: "clinical-triage-benchmark"
version: "2.0.0"
description: "A POMDP clinical triage environment evaluating long-horizon reasoning, active state-space discovery, and asymmetric risk management under uncertainty."

entrypoint: app.queue_env:ClinicalQueueEnv

observation_model: app.models:QueueObservation
action_model: app.models:TriageAction
reward_model: app.models:TriageReward

tasks:
  - id: easy_triage
    description: Clear-cut presentations with multiple hallway patients
    difficulty: easy
    grader:
      type: programmatic
      module: app.queue_grader
      function: compute_queue_reward

  - id: medium_triage
    description: Partial data requiring 2-3 global information gathering steps
    difficulty: medium
    grader:
      type: programmatic
      module: app.queue_grader
      function: compute_queue_reward

  - id: hard_triage
    description: Ambiguous presentations across the hallway with critical risks
    difficulty: hard
    grader:
      type: programmatic
      module: app.queue_grader
      function: compute_queue_reward
